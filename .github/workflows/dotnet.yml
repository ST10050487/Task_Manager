name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET Framework Developer Pack 4.8
      run: choco install netfx-4.8-devpack -y

    - name: Install NuGet CLI
      run: choco install nuget.commandline -y

    - name: Find and restore all solutions (NuGet)
      shell: pwsh
      run: |
        Write-Host "Searching for .sln files..."
        $slns = Get-ChildItem -Recurse -Filter *.sln -ErrorAction SilentlyContinue
        if (-not $slns) {
          Write-Host "No .sln files found in repository."
          exit 1
        }
        foreach ($s in $slns) {
          Write-Host "Found: $($s.FullName)"
          nuget restore "$($s.FullName)"
        }

    - name: Restore dependencies (dotnet)
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal
