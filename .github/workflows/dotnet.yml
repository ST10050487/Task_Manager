name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET Framework Developer Pack 4.8
      run: choco install netfx-4.8-devpack -y

    - name: Install NuGet CLI
      run: choco install nuget.commandline -y

    - name: List repo files (debug)
      run: Get-ChildItem -Recurse -Filter *.sln

    - name: NuGet restore (for packages.config projects)
      run: nuget restore '**/*.sln'

    - name: Restore dependencies (dotnet)
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal
